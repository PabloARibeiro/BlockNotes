<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BlockNotes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="controles-principais" style="display: flex; gap: 10px; margin-bottom: 15px;">
        <button id="btn-add"> + Adicionar Bloco</button>
        <button id="btn-exportar">Exportar (Salvar .json)</button>
        <button id="btn-importar">Importar (Carregar .json)</button>
        <input type="file" id="input-arquivo" accept=".json" style="display: none;">
    </div>
    <div id="area-trabalho"></div>
    <script src="script.js"></script>
</body>
</html>
